<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon_48x48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_16x16.png">
    <meta property="og:image" content="https://www.warmthengine.com/og-image.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Warmth Engine Observatory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --weo-surface-base: #0F172A;
            --weo-surface-raised: #1E293B;
            --weo-text-primary: #E2E8F0;
            --weo-text-secondary: #CBD5E1;
            --weo-accent-hover: #60a5fa;
            --weo-western-glow: rgba(96, 165, 250, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--weo-surface-base);
            color: var(--weo-text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
        }
        
        .error-code {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--weo-accent-hover) 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--weo-text-primary);
        }
        
        .error-message {
            font-size: 1rem;
            color: var(--weo-text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .home-link {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: var(--weo-western-glow);
            border: 1px solid var(--weo-accent-hover);
            color: var(--weo-accent-hover);
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: all 200ms cubic-bezier(0.33, 1, 0.68, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        
        .home-link:hover {
            background: var(--weo-accent-hover);
            color: var(--weo-surface-base);
        }
        
        .observatory-badge {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .observatory-badge span {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.875rem;
            color: var(--weo-text-secondary);
            letter-spacing: 0.08em;
        }
        
        .copyright {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--weo-text-secondary);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved. 
            Return to the Observatory to continue exploring AI infrastructure coordination dynamics.
        </p>
        <a href="/" class="home-link">Return to Observatory</a>
        <div class="observatory-badge">
            <span>WARMTH ENGINE OBSERVATORY</span>
            <p class="copyright">© 2026 Warmth Engine Observatory</p>
        </div>
    </div>
<script data-goatcounter="https://warmthengine.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
