<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_16x16.png">
    <meta property="og:image" content="https://www.warmthengine.com/og-image.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Warmth Engine Observatory</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --accent-blue: #60a5fa;
            --accent-glow: rgba(96, 165, 250, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .error-message {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .home-link {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: var(--accent-glow);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .home-link:hover {
            background: var(--accent-blue);
            color: var(--bg-primary);
        }
        
        .observatory-badge {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .observatory-badge span {
            font-size: 0.875rem;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }
        
        .copyright {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved. 
            Return to the Observatory to continue exploring AI infrastructure coordination dynamics.
        </p>
        <a href="index.html" class="home-link">Return to Observatory</a>
        <div class="observatory-badge">
            <span>WARMTH ENGINE OBSERVATORY</span>
            <p class="copyright">© 2026 Warmth Engine</p>
        </div>
    </div>
</body>
</html>
